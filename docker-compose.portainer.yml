# Portainer Stack — THE STANDARD Production Booking
# ----------------------------------------------------
# Deploy via: Portainer → Stacks → Add stack → Repository
#   Repository URL : https://github.com/narasitk77/thestandard-production-booking
#   Reference      : refs/heads/main
#   Compose path   : docker-compose.portainer.yml
#   Env vars       : paste from .env.portainer.example into "Environment variables"
#
# This compose file pulls a pre-built image from GHCR (built automatically by
# .github/workflows/docker-build.yml on every push to main).
#
# Architecture:
#   browser --HTTPS--> caddy (:3443, self-signed cert) --HTTP--> app (:3000)
# Caddy terminates TLS so Google OAuth works: the browser talks HTTPS to a
# real hostname (thestandard.fortiddns.com), which Google's OAuth requires.
# The app itself is internal-only — reached only through Caddy.
#
# Router: forward external port 3443 -> <docker-host-ip>:3443

services:
  db:
    image: postgres:16-alpine
    container_name: production-booking-db
    restart: unless-stopped
    environment:
      # db name + user are hardcoded internal identifiers; only the password
      # is taken from stack env vars.
      POSTGRES_DB: production_booking
      POSTGRES_USER: prod_booking
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in stack env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prod_booking -d production_booking"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  app:
    image: ghcr.io/narasitk77/thestandard-production-booking:${IMAGE_TAG:-latest}
    container_name: production-booking-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # start.sh runs a defensive CREATE DATABASE IF NOT EXISTS + prisma db push.
      DATABASE_URL: postgresql://prod_booking:${POSTGRES_PASSWORD}@db:5432/production_booking

      # --- Next.js / Auth ---
      # NEXTAUTH_URL must be the public HTTPS URL the browser uses (the Caddy
      # address), e.g. https://thestandard.fortiddns.com:3443
      NEXTAUTH_URL: ${NEXTAUTH_URL:?set NEXTAUTH_URL — public https URL via Caddy}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set NEXTAUTH_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-${NEXTAUTH_URL}}

      # --- Google OAuth (sign-in + Gmail send) ---
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?set GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?set GOOGLE_CLIENT_SECRET}

      # --- Google Service Account (for Sheets / Calendar automation) ---
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${GOOGLE_SERVICE_ACCOUNT_EMAIL:-}
      GOOGLE_PRIVATE_KEY: ${GOOGLE_PRIVATE_KEY:-}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON:-}
      GOOGLE_SHEETS_ID: ${GOOGLE_SHEETS_ID:-}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-}

      # --- Email delivery (SMTP via Gmail App Password) ---
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-}

      # --- App ---
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    # No published port — the app is reached only through Caddy.
    networks:
      - app-network

  caddy:
    image: caddy:2-alpine
    container_name: production-booking-caddy
    restart: unless-stopped
    depends_on:
      - app
    # TLS termination via CLI args (no Caddyfile mount — Portainer git stacks
    # can't bind-mount repo files). --internal-certs issues a self-signed cert
    # from Caddy's local CA (persisted in caddy_data). The browser shows a
    # one-time "not private" warning — click Advanced -> Proceed once.
    command: caddy reverse-proxy --from https://thestandard.fortiddns.com:3443 --to app:3000 --internal-certs
    ports:
      - "3443:3443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  app-network:
    driver: bridge
