# Portainer Stack — THE STANDARD Production Booking
# ----------------------------------------------------
# Deploy via: Portainer → Stacks → Add stack → Repository
#   Repository URL : https://github.com/narasitk77/thestandard-production-booking
#   Reference      : refs/heads/main
#   Compose path   : docker-compose.portainer.yml
#   Env vars       : paste from .env.portainer.example into "Environment variables"
#
# This compose file pulls a pre-built image from GHCR (built automatically by
# .github/workflows/docker-build.yml on every push to main). Portainer does
# NOT need to build the image — it just pulls and runs.
#
# Notes vs. the local docker-compose.yml:
# - Caddy terminates TLS — the app is served over HTTPS on $APP_PORT. This is
#   required: browsers (Chrome HTTPS-First) upgrade http:// to https://, which
#   breaks the Google OAuth callback on a plain-HTTP server. Caddy fixes that.
# - No migrate service (start.sh already runs `prisma db push` on every boot)
# - Uses GHCR image (no `build:` context — faster Portainer deploys)

version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: production-booking-db
    restart: unless-stopped
    environment:
      # NOTE: db name + user are hardcoded — they're internal identifiers, not
      # secrets, and making them user-configurable led to silent typo failures.
      # Only POSTGRES_PASSWORD is sourced from stack env vars.
      POSTGRES_DB: production_booking
      POSTGRES_USER: prod_booking
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in stack env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prod_booking -d production_booking"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  app:
    image: ghcr.io/narasitk77/thestandard-production-booking:${IMAGE_TAG:-latest}
    container_name: production-booking-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # --- Database (db name + user hardcoded — matches db service above) ---
      # start.sh contains a defensive CREATE DATABASE IF NOT EXISTS, so the
      # app self-heals if the postgres volume was initialized with a stale name.
      DATABASE_URL: postgresql://prod_booking:${POSTGRES_PASSWORD}@db:5432/production_booking

      # --- Next.js / Auth ---
      NEXTAUTH_URL: ${NEXTAUTH_URL:?set NEXTAUTH_URL — public URL of the app}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set NEXTAUTH_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-${NEXTAUTH_URL}}

      # --- Google OAuth (admin sign-in + Gmail send + Sheets/Calendar) ---
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?set GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?set GOOGLE_CLIENT_SECRET}

      # --- Google Service Account (for Sheets / Calendar automation) ---
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${GOOGLE_SERVICE_ACCOUNT_EMAIL:-}
      GOOGLE_PRIVATE_KEY: ${GOOGLE_PRIVATE_KEY:-}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON:-}
      GOOGLE_SHEETS_ID: ${GOOGLE_SHEETS_ID:-}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-}

      # --- Email delivery (Gmail OAuth is primary; Resend as optional fallback) ---
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-}

      # --- App ---
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    # No published port — the app is reached only through Caddy (TLS proxy).
    networks:
      - app-network

  caddy:
    image: caddy:2-alpine
    container_name: production-booking-caddy
    restart: unless-stopped
    depends_on:
      - app
    # Configured via CLI args, not a Caddyfile — Portainer git stacks can't
    # reliably bind-mount repo files onto the Docker host. `caddy reverse-proxy`
    # with --internal-certs terminates HTTPS using a self-signed cert from
    # Caddy's local CA (persisted in the caddy_data volume).
    command: caddy reverse-proxy --from https://192.168.21.220.nip.io:3001 --to app:3000 --internal-certs
    ports:
      # Host $APP_PORT → Caddy's HTTPS listener (container port 3001).
      - "${APP_PORT:-3001}:3001"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  app-network:
    driver: bridge
