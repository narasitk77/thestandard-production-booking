# Portainer Stack — THE STANDARD Production Booking
# ----------------------------------------------------
# Deploy via: Portainer → Stacks → Add stack → Repository
#   Repository URL : https://github.com/narasitk77/thestandard-production-booking
#   Reference      : refs/heads/main
#   Compose path   : docker-compose.portainer.yml
#   Env vars       : paste from .env.portainer.example into "Environment variables"
#
# This compose file pulls a pre-built image from GHCR (built automatically by
# .github/workflows/docker-build.yml on every push to main). Portainer does
# NOT need to build the image — it just pulls and runs.
#
# Notes:
# - The app is served directly over plain HTTP on $APP_PORT (no TLS proxy).
# - Auth: set AUTH_DISABLED=1 to run without any login (trusted LAN access);
#   set AUTH_DISABLED=0 to use Google OAuth sign-in.
# - start.sh runs `prisma db push` on every boot (no separate migrate step).

services:
  db:
    image: postgres:16-alpine
    container_name: production-booking-db
    restart: unless-stopped
    environment:
      # NOTE: db name + user are hardcoded — they're internal identifiers, not
      # secrets, and making them user-configurable led to silent typo failures.
      # Only POSTGRES_PASSWORD is sourced from stack env vars.
      POSTGRES_DB: production_booking
      POSTGRES_USER: prod_booking
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in stack env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prod_booking -d production_booking"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  app:
    image: ghcr.io/narasitk77/thestandard-production-booking:${IMAGE_TAG:-latest}
    container_name: production-booking-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Prefer IPv4 for DNS. The Docker host has no IPv6 egress, but DNS
      # resolves hosts like accounts.google.com to IPv6 — Node would try IPv6
      # first and hang, breaking Google OAuth ("outgoing request timed out").
      # ipv4first makes Node connect over IPv4, which works.
      NODE_OPTIONS: --dns-result-order=ipv4first

      # --- Database (db name + user hardcoded — matches db service above) ---
      # start.sh contains a defensive CREATE DATABASE IF NOT EXISTS, so the
      # app self-heals if the postgres volume was initialized with a stale name.
      DATABASE_URL: postgresql://prod_booking:${POSTGRES_PASSWORD}@db:5432/production_booking

      # --- Auth ---
      # AUTH_DISABLED=1 → no login, every request is the seeded admin (LAN use).
      # AUTH_DISABLED=0 → Google OAuth sign-in (needs the OAuth env vars below).
      # NEVER set AUTH_DISABLED=1 on the public internet-facing prod.
      AUTH_DISABLED: ${AUTH_DISABLED:-0}
      # Which admin AUTH_DISABLED acts as. Should be an existing ADMIN user row
      # so DB-backed reads resolve. Defaults to narasit.k@thestandard.co.
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      # Comma-separated emails auto-promoted to ADMIN on first OAuth login.
      # Defaults to the original owner when unset.
      INITIAL_ADMIN_EMAILS: ${INITIAL_ADMIN_EMAILS:-}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?set NEXTAUTH_URL — public URL of the app}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set NEXTAUTH_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-${NEXTAUTH_URL}}

      # --- Google OAuth (only used when AUTH_DISABLED=0) ---
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

      # --- Google Service Account (for Sheets / Calendar automation) ---
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${GOOGLE_SERVICE_ACCOUNT_EMAIL:-}
      GOOGLE_PRIVATE_KEY: ${GOOGLE_PRIVATE_KEY:-}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON:-}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-}
      # Domain-Wide Delegation: a @thestandard.co user the service account
      # impersonates so it can invite assigned crew as calendar GUESTS + send
      # invites. Requires DWD enabled in Workspace Admin (scope: calendar).
      # DEFAULTS to narasit.k@thestandard.co (DWD verified working for this user)
      # so guests work out of the box after a redeploy — no stack env var needed.
      # Set a stack env var of the same name to override with a different subject.
      GOOGLE_IMPERSONATE_SUBJECT: ${GOOGLE_IMPERSONATE_SUBJECT:-narasit.k@thestandard.co}

      # --- Producer Dashboard sheet ---
      # Source-of-truth sheet for "All Projects" / "PD <producer>" / "Dir <director>"
      # / "Bookings" tabs. The app mints project Episode IDs and writes those tabs
      # directly via the Google service account (no Apps Script Web App anymore).
      PRODUCER_DASHBOARD_SHEET_ID: ${PRODUCER_DASHBOARD_SHEET_ID:-}

      # --- Email delivery (SMTP via Gmail App Password) ---
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-}

      # --- Calendar guest reconciliation ---
      # start.sh launches a small worker that calls the internal reconcile API
      # every 10 minutes. It checks confirmed bookings and repairs missing or
      # stale Google Calendar guests so transient approve/assign failures heal.
      CALENDAR_RECONCILE_SECRET: ${CALENDAR_RECONCILE_SECRET:-${NEXTAUTH_SECRET}}
      CALENDAR_RECONCILE_INTERVAL_MS: ${CALENDAR_RECONCILE_INTERVAL_MS:-600000}
      # Override only if the Next.js server inside the container listens on
      # something other than http://127.0.0.1:3000 (e.g. if you change PORT).
      # CALENDAR_RECONCILE_URL: ${CALENDAR_RECONCILE_URL:-}

      # --- Footage → sheet auto-matcher (v1.34.x) ---
      # A supervised worker (scripts/footage-sheet-sync-worker.js) walks the
      # Shared Drive tree under DRIVE_FOOTAGE_ROOT every FOOTAGE_WORKER_INTERVAL_MS,
      # parses the Production ID from each path, looks up the booking, and appends
      # a row to FOOTAGE_LOG_SHEET_ID. Stays dormant until FOOTAGE_WORKER_ENABLED=1.
      FOOTAGE_LOG_SHEET_ID: ${FOOTAGE_LOG_SHEET_ID:-}
      FOOTAGE_LOG_TAB: ${FOOTAGE_LOG_TAB:-}
      DRIVE_FOOTAGE_ROOT: ${DRIVE_FOOTAGE_ROOT:-}
      # v1.75 — Drive folder that holds Admin document attachments (quotes,
      # invoices, receipts). The app auto-creates one subfolder per job inside
      # it. Set to a My Drive / Shared Drive folder id to enable doc uploads.
      DRIVE_DOCS_ROOT: ${DRIVE_DOCS_ROOT:-}
      FOOTAGE_WORKER_ENABLED: ${FOOTAGE_WORKER_ENABLED:-0}
      FOOTAGE_WORKER_INTERVAL_MS: ${FOOTAGE_WORKER_INTERVAL_MS:-600000}
      # Secret for the internal /api/internal/footage/sync endpoint; defaults to
      # NEXTAUTH_SECRET (same pattern as CALENDAR_RECONCILE_SECRET above).
      FOOTAGE_SYNC_SECRET: ${FOOTAGE_SYNC_SECRET:-${NEXTAUTH_SECRET}}
      # FOOTAGE_SYNC_URL: ${FOOTAGE_SYNC_URL:-}  # override only if app isn't on 127.0.0.1:3000

      # --- _SHOOT marker reconcile (v1.135; nightly content-audit v1.136) ---
      # Supervised worker (scripts/shoot-marker-worker.js) runs ONCE A NIGHT
      # (SHOOT_MARKER_WORKER_HOUR, default 03:00 BKK). It enforces one _SHOOT
      # marker per booking across AGN project boxes (trashes pre-migration
      # box-level `_SHOOT-<oldcode>.txt` duplicates that made the footage crawler
      # file two cards per shoot — Neo memo 2026-07-09) AND audits each marker's
      # content (Production ID + Gregorian date) vs the DB, rewriting on drift.
      # Idempotent; only trashes small regenerable stubs to Shared-Drive trash
      # (recoverable). Emails a digest to SHOOT_MARKER_REPORT_EMAIL when a night
      # finds anything. Dormant until SHOOT_MARKER_WORKER_ENABLED=1.
      SHOOT_MARKER_WORKER_ENABLED: ${SHOOT_MARKER_WORKER_ENABLED:-0}
      SHOOT_MARKER_WORKER_HOUR: ${SHOOT_MARKER_WORKER_HOUR:-3}
      SHOOT_MARKER_RECONCILE_SECRET: ${SHOOT_MARKER_RECONCILE_SECRET:-${NEXTAUTH_SECRET}}
      SHOOT_MARKER_REPORT_EMAIL: ${SHOOT_MARKER_REPORT_EMAIL:-${FEEDBACK_EMAIL:-}}
      # SHOOT_MARKER_RECONCILE_URL: ${SHOOT_MARKER_RECONCILE_URL:-}  # override only if app isn't on 127.0.0.1:3000

      # --- กันลืม reminders (v1.62.0) ---
      # Supervised worker (scripts/reminders-worker.js) scans loans / rentals /
      # invoices / repairs / upcoming shoots / warranties once a day and pushes a
      # digest to Discord + email. Dormant until REMINDERS_WORKER_ENABLED=1.
      # DISCORD_WEBHOOK_URL is a secret — set it as a Portainer stack env var,
      # never commit the value here.
      REMINDERS_WORKER_ENABLED: ${REMINDERS_WORKER_ENABLED:-0}
      REMINDERS_WORKER_INTERVAL_MS: ${REMINDERS_WORKER_INTERVAL_MS:-86400000}
      REMINDERS_SECRET: ${REMINDERS_SECRET:-${NEXTAUTH_SECRET}}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      REMINDER_ADMIN_EMAIL: ${REMINDER_ADMIN_EMAIL:-}
      INVOICE_AGING_DAYS: ${INVOICE_AGING_DAYS:-7}
      SHOOT_GEAR_LOOKAHEAD_DAYS: ${SHOOT_GEAR_LOOKAHEAD_DAYS:-3}
      # REMINDERS_URL: ${REMINDERS_URL:-}  # override only if app isn't on 127.0.0.1:3000

      # --- Automated DB backup (v1.77) ---
      # Supervised worker (scripts/backup-worker.js) pg_dumps the DB daily, gzips
      # it, and uploads to BACKUP_DRIVE_FOLDER_ID (service account needs edit
      # access). Dormant until BACKUP_WORKER_ENABLED=1. The dead-man check alerts
      # (Discord+email) if no backup lands within ~26h. Old backups are pruned
      # after BACKUP_RETENTION_DAYS.
      BACKUP_WORKER_ENABLED: ${BACKUP_WORKER_ENABLED:-0}
      BACKUP_DRIVE_FOLDER_ID: ${BACKUP_DRIVE_FOLDER_ID:-}
      BACKUP_INTERVAL_MS: ${BACKUP_INTERVAL_MS:-86400000}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_SECRET: ${BACKUP_SECRET:-${NEXTAUTH_SECRET}}

      # v1.111 — NAS ↔ Production Team sync verification. The Mac agent
      # (scripts/nas-manifest-agent.sh) POSTs NAS manifests with x-nas-secret;
      # sync-complete + daily digest emails go to NAS_REPORT_EMAIL
      # (falls back to REMINDER_ADMIN_EMAIL).
      NAS_MANIFEST_SECRET: ${NAS_MANIFEST_SECRET:-}
      NAS_REPORT_EMAIL: ${NAS_REPORT_EMAIL:-}

      # (Wasabi dual-write removed — WASABI_* env vars no longer read by the app.)

      # --- App ---
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    ports:
      - "${APP_PORT:-3001}:3000"
    networks:
      - app-network
      # Also join the Nginx Proxy Manager network so NPM can reach the app by
      # container name. Declaring it here (not a manual `docker network
      # connect`) keeps the attachment across redeploys.
      - npm-network

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local

networks:
  app-network:
    driver: bridge
  # Existing external network shared with Nginx Proxy Manager (management stack).
  npm-network:
    external: true
    name: management_default
