version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: production-booking-db
    restart: unless-stopped
    environment:
      # NOTE: db name + user are hardcoded — they're internal identifiers, not
      # secrets, and making them user-configurable led to silent typo failures.
      # Only POSTGRES_PASSWORD is sourced from .env / stack env vars.
      POSTGRES_DB: production_booking
      POSTGRES_USER: prod_booking
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prod_booking -d production_booking"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: production-booking-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # start.sh contains a defensive CREATE DATABASE IF NOT EXISTS, so the
      # app self-heals if the postgres volume was initialized with a stale name.
      DATABASE_URL: postgresql://prod_booking:${POSTGRES_PASSWORD:-changeme}@db:5432/production_booking
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      # Auth (required for sign-in)
      NEXTAUTH_URL: ${NEXTAUTH_URL:-${NEXT_PUBLIC_APP_URL:-http://localhost:3000}}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # Google service account (Sheets + Calendar + Project ID dropdown)
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON:-}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${GOOGLE_SERVICE_ACCOUNT_EMAIL:-}
      GOOGLE_PRIVATE_KEY: ${GOOGLE_PRIVATE_KEY:-}
      GOOGLE_SHEETS_ID: ${GOOGLE_SHEETS_ID:-}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-}
      GOOGLE_IMPERSONATE_SUBJECT: ${GOOGLE_IMPERSONATE_SUBJECT:-narasit.k@thestandard.co}
      CALENDAR_ALERT_EMAIL: ${CALENDAR_ALERT_EMAIL:-${GOOGLE_IMPERSONATE_SUBJECT:-narasit.k@thestandard.co}}
      PRODUCER_DASHBOARD_SHEET_ID: ${PRODUCER_DASHBOARD_SHEET_ID:-}
      # Email (Gmail OAuth is primary; Resend optional fallback)
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-}

      # --- Calendar guest reconciliation (parity with docker-compose.portainer.yml) ---
      # start.sh launches a small worker that calls the internal reconcile API every
      # 10 minutes. Checks confirmed bookings and repairs missing or stale Google
      # Calendar guests so transient approve/assign failures heal automatically.
      CALENDAR_RECONCILE_SECRET: ${CALENDAR_RECONCILE_SECRET:-${NEXTAUTH_SECRET:-}}
      CALENDAR_RECONCILE_INTERVAL_MS: ${CALENDAR_RECONCILE_INTERVAL_MS:-600000}
      # Override only if the Next.js server inside the container listens on
      # something other than http://127.0.0.1:3000 (e.g. if you change PORT).
      # CALENDAR_RECONCILE_URL: ${CALENDAR_RECONCILE_URL:-}

      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - app-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  nginx:
    image: nginx:alpine
    container_name: production-booking-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local

networks:
  app-network:
    driver: bridge
